<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class=bem-vindo>
    <title>Biblioteca-pessoal</title>
    </header>
<header class="principal">
        <h1>Biblioteca-pessoal</h1>
        <button class="adicionar">Adicionar Novo</button>
    </header>

    <div class="estante-mangas"></div>

    <footer class="rodape">
        <p>Feito por: Pedro</p>
    </footer>
    <div id="modalAdicionar" class="modal-overlay">
        <div class="modal-conteudo">
            <span class="fechar-modal">&times;</span>
            <h2>Adicionar Novo Livro</h2>
            <form id="formManga">
                
                <label for="titulo">Título:</label>   <!--usar label para associar o texto ao que vai ser escrito usa inves dos oto por ser melhor em fomularios -->
                <input type="text" id="titulo" required>
                <label for="autor">Autor:</label>
                <input type="text" id="autor" required>
                <label for="genero">Gênero:</label>
                <input type="text" id="genero" required>
                <label for="status">Status:</label>
                <input type="text" id="status" required>
                <label for="capitulo">Capítulo:</label>
                <input type="number" id="capitulo" required>
                <label for="foto">Url da capa</label>
                <input type="text" id="foto" required>
                <button type="submit" class="salvar">Salvar na estante!</button>
            </form>
        </div>
    </div>


<script src="script.js"></script>
</body>
</html>
